# Profil: train
# Pełny trening produkcyjny
# ZAKTUALIZOWANY po analizie smoke test (dodano stabilizatory)

name: "train"

# === TRAINING ===
steps: 30000
batch_size: 64

# POPRAWKA: Zmniejszony lr_D dla lepszej stabilności
lr_D: 0.0001  # było: 0.0002
lr_G: 0.0002

# === REGULARIZATION ===
# R1 penalty włączony dla pełnego treningu (stabilizuje, zapobiega mode collapse)
use_r1_penalty: true
r1_lambda: 10.0
r1_every: 16  # stosuj co 16 iteracji (oszczędność ~6% czasu)

# === LOGGING ===
log_every: 1
grid_every: 1000
ckpt_every: 5000
eval_every: 10000
live: false
use_wandb: true

# === EVALUATION ===
eval_samples: 50000
fid_samples: 10000
