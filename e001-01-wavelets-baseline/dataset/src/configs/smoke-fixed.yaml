# Zestaw poprawionych konfiguracji - Analiza mode collapse
# Po analizie logów z pierwszego runu zidentyfikowano problemy:
# 1. FID rośnie zamiast maleć (419 -> 425)
# 2. Mode collapse na kroku 224-227
# 3. Discriminator dominuje nad Generatorem

# ============================================================================
# POPRAWIONY smoke.yaml - do testowania poprawek
# ============================================================================

name: "smoke-fixed"

# === TRAINING ===
steps: 500
batch_size: 32

# ZMIANA #1: Zmniejszony learning rate dla D (zapobiega dominacji)
lr_D: 0.0001  # było: 0.0002
lr_G: 0.0002  # bez zmian

# === LOGGING ===
log_every: 1
grid_every: 100
ckpt_every: 250

# ZMIANA #2: Częstsza ewaluacja (wcześniejsza detekcja problemów)
eval_every: 100  # było: 250
live: false
use_wandb: true

# === EVALUATION ===
fid_samples: 2048

# === AUGMENTACJE ===
# ZMIANA #3: Silniejsze augmentacje (utrudnia D)
diffaug_policy: "color,translation,cutout"  # można dodać "flip" jeśli potrzeba

