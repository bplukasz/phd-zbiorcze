# Profil: smoke
# Smoke test - szybka weryfikacja czy wszystko działa
# ZAKTUALIZOWANY po analizie wyników (FID rósł zamiast maleć)

name: "smoke"

# === TRAINING ===
steps: 500
batch_size: 32

# POPRAWKA: Zmniejszony lr_D (zapobiega dominacji D nad G)
lr_D: 0.0001  # było: 0.0002 (dziedziczyło z base)
lr_G: 0.0002

# === REGULARIZATION ===
use_r1_penalty: false  # wyłączone dla smoke (oszczędność czasu)

# === LOGGING ===
log_every: 1
grid_every: 100
ckpt_every: 250

# POPRAWKA: Częstsza ewaluacja (wcześniejsza detekcja problemów)
eval_every: 100  # było: 250
live: false
use_wandb: true

# === EVALUATION ===
fid_samples: 2048
