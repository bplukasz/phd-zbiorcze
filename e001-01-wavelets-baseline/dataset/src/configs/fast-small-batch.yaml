# Profil: fast-small-batch
# Maksymalna szybkość iteracji (mały batch + małe obrazy)
# ~8-10x szybciej per iteracja niż CelebA 128x128

name: "fast-small-batch"

# === DATASET ===
dataset_name: "cifar10"
img_size: 32
img_channels: 3

# === MODEL ===
z_dim: 128
g_ch: 64
d_ch: 64

# === TRAINING ===
steps: 40000  # więcej iteracji bo mniejszy batch
batch_size: 32  # mały batch = szybka iteracja

lr_D: 0.0001
lr_G: 0.0002

# === REGULARIZATION ===
use_r1_penalty: false

# === LOGGING ===
log_every: 1
grid_every: 1000
ckpt_every: 10000
eval_every: 10000
live: false
use_wandb: true

# === EVALUATION ===
eval_samples: 10000
fid_samples: 2048

# === PATHS ===
data_dir: "/tmp/cifar10"
