# =========================================================
# Profil: fast
# Szybkie prototypowanie — CIFAR-10 32×32, mały model
# Cel: weryfikacja pipelinu w ~10 min na GPU
# =========================================================
name: "fast"

dataset_name: "cifar10"
img_channels: 3
img_resolution: 32

z_dim: 128
base_channels: 64
channel_max: 512
blocks_per_stage: 1
expansion_factor: 2
group_size: 16

steps: 5000
batch_size: 256
lr_g: 2.0e-4
lr_d: 2.0e-4
gamma: 10.0

log_every: 50
grid_every: 500
ckpt_every: 5000
save_n_samples: 64

metrics_every: 250
metrics_num_fake: 5000
metrics_fake_batch_size: 256
metrics_pr_num_samples: 5000
metrics_kid_subset_size: 500
metrics_max_real: 10000
metrics_lpips_pool_size: 2048
metrics_lpips_num_pairs: 1024

use_amp_for_d: true