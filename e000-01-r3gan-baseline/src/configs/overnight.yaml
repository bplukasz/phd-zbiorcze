# =========================================================
# Profil: overnight
# Pełny trening na noc — CelebA 64×64 lub CIFAR-10 64×64
# ~8-12h na RTX 3080/4080
# Ustaw data_dir przez CLI: --data-dir /sciezka/do/celeba
# =========================================================
name: "overnight"

dataset_name: "cifar10"
img_channels: 3
img_resolution: 64

z_dim: 256
base_channels: 96
channel_max: 768
blocks_per_stage: 2
expansion_factor: 2
group_size: 16

steps: 80000
batch_size: 64
lr_g: 2.0e-4
lr_d: 2.0e-4
gamma: 10.0
ema_beta: 0.9995

use_amp_for_g: true
use_amp_for_d: false

log_every: 100
grid_every: 1000
ckpt_every: 20000
save_n_samples: 64

metrics_every: 2500
metrics_num_fake: 50000
metrics_fake_batch_size: 256
metrics_pr_num_samples: 10000
metrics_max_real: 50000

