# =========================================================
# Eksperyment: Faza B / R0 — Baseline
# Rozdzielczość: 32x32 (CIFAR-10)
# Opis: Czysty baseline R3GAN bez żadnych rozszerzeń.
#        Punkt zerowy do wszystkich porównań w Fazie B i C.
# Seed: 42 (single seed — Faza B)
# Budżet: ~500 kimg (steps=500000, batch=128 → ~500M obrazów)
#          Dla szybkiego testu ustaw steps=50000 (~50 kimg)
# =========================================================
name: "phase_b_r0_baseline_32"

# === DATASET ===
dataset_name: "cifar10"
img_channels: 3
img_size: 32
img_resolution: 32

# === MODEL ===
z_dim: 128
base_channels: 64
channel_max: 512
blocks_per_stage: 2
expansion_factor: 2
group_size: 16

# === DISCRIMINATOR: baseline (brak gałęzi pomocniczych) ===
wavelet_enabled: false
matched_capacity_enabled: false

# === GENERATOR: brak regularizera ===
wave_reg_enabled: false
fft_reg_enabled: false

# === TRAINING ===
seed: 42
steps: 30000      # ~100 kimg przy batch=128 → ok na szybki Faza B
batch_size: 128
lr_g: 2.0e-4
lr_d: 2.0e-4
betas: [0.0, 0.99]
gamma: 10.0
ema_beta: 0.999
use_amp_for_g: true
use_amp_for_d: false
channels_last: true

# === LOGGING ===
log_every: 100
grid_every: 2000
ckpt_every: 10000
save_n_samples: 64

# === GAN METRICS (co 5 kimg przy batch=128 → co 5000 steps) ===
metrics_every: 2500
metrics_num_fake: 50000
metrics_fake_batch_size: 256
metrics_fid_feature: 2048
metrics_kid_feature: 2048
metrics_kid_subsets: 100
metrics_kid_subset_size: 1000
metrics_max_real: 50000
metrics_pr_num_samples: 10000
metrics_pr_k: 3
metrics_lpips_num_pairs: 2048
metrics_lpips_pool_size: 4096
metrics_amp_dtype: "bf16"
metrics_spectral: true
