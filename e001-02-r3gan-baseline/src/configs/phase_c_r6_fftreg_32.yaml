# =========================================================
# Eksperyment: Faza C / R3 — WaveD + WaveReg
# Rozdzielczość: 32x32 (CIFAR-10)
# Opis: Dyskryminator z gałęzią waveletową HF +
#        regularizacja statystyk energii HF po stronie generatora.
#        WaveReg: log-energy matching (mean + 0.5*std),
#        EMA statystyk realnych (beta=0.99).
#        lambda_wave=0.02 — punkt startowy.
# Seed: 42 (Faza C — potem seed 43 dla 2-seedowej weryfikacji)
# =========================================================
name: "phase_c_r6_fftreg_32"

# === DATASET ===
dataset_name: "cifar10"
img_channels: 3
img_size: 32
img_resolution: 32

# === MODEL ===
z_dim: 128
base_channels: 64
channel_max: 512
blocks_per_stage: 2
expansion_factor: 2
group_size: 16

# === DISCRIMINATOR: wavelet HF branch ===
wavelet_enabled: false
matched_capacity_enabled: false
wavelet_type: "haar"
wavelet_level: 1
wavelet_hf_only: true
wavelet_fuse_after_stage: 0
wavelet_branch_mid_scale: 0.5
wavelet_init_gate: 0.0

# === GENERATOR: wavelet statistic regularizer ===
# Cel: dopasowanie rozkładu log-energii pasm LH/HL/HH fake→real
# EMA statystyk realnych utrzymywane w buforze trainera
wave_reg_enabled: false
fft_reg_weight: 0.02     # lambda_wave — punkt startowy wg roadmapy
fft_reg_enabled: true

# === TRAINING (identyczne jak R0/R1/R2 — krytyczne!) ===
seed: 42
steps: 30000
batch_size: 128
lr_g: 2.0e-4
lr_d: 2.0e-4
betas: [0.0, 0.99]
gamma: 10.0
ema_beta: 0.999
use_amp_for_g: true
use_amp_for_d: false
channels_last: true

# === LOGGING ===
log_every: 100
grid_every: 2000
ckpt_every: 10000
save_n_samples: 64

# === GAN METRICS (identyczne jak R0) ===
metrics_every: 2500
metrics_num_fake: 50000
metrics_fake_batch_size: 256
metrics_fid_feature: 2048
metrics_kid_feature: 2048
metrics_kid_subsets: 100
metrics_kid_subset_size: 1000
metrics_max_real: 50000
metrics_pr_num_samples: 10000
metrics_pr_k: 3
metrics_lpips_num_pairs: 2048
metrics_lpips_pool_size: 4096
metrics_amp_dtype: "bf16"
metrics_spectral: true

