# =========================================================
# Eksperyment: Faza B / R0 — Baseline
# Rozdzielczość: 64x64 (CIFAR-10 upscaled lub CelebA 64x64)
# Opis: Czysty baseline R3GAN na 64x64.
#        Większy model niż 32x32 wg overnight.yaml.
#        Uwaga: przy 64x64 DWT daje wyjście 32x32 — nadal wygodny
#        punkt fuzji po stage[0].
# Seed: 42 (single seed — Faza B)
# =========================================================
name: "phase_b_r0_baseline_64"

# === DATASET ===
# Dla CelebA: --data-dir /sciezka/do/celeba
dataset_name: "cifar10"
img_channels: 3
img_size: 64
img_resolution: 64

# === MODEL (większy dla 64x64) ===
z_dim: 256
base_channels: 96
channel_max: 768
blocks_per_stage: 2
expansion_factor: 2
group_size: 16

# === DISCRIMINATOR: baseline ===
wavelet_enabled: false
matched_capacity_enabled: false

# === GENERATOR: brak regularizera ===
wave_reg_enabled: false
fft_reg_enabled: false

# === TRAINING ===
seed: 42
steps: 200000      # ~200 kimg przy batch=64
batch_size: 64
lr_g: 2.0e-4
lr_d: 2.0e-4
betas: [0.0, 0.99]
gamma: 10.0
ema_beta: 0.999
use_amp_for_g: true
use_amp_for_d: false
channels_last: true

# === LOGGING ===
log_every: 100
grid_every: 2000
ckpt_every: 50000
save_n_samples: 64

# === GAN METRICS (co ~5 kimg przy batch=64 → co 5000 steps) ===
metrics_every: 5000
metrics_num_fake: 10000
metrics_fake_batch_size: 128
metrics_fid_feature: 2048
metrics_kid_feature: 2048
metrics_kid_subsets: 100
metrics_kid_subset_size: 1000
metrics_max_real: 50000
metrics_pr_num_samples: 10000
metrics_pr_k: 3
metrics_lpips_num_pairs: 2048
metrics_lpips_pool_size: 4096
metrics_amp_dtype: "bf16"
metrics_spectral: true

