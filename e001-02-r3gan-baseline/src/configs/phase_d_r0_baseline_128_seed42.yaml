# =========================================================
# Eksperyment: Faza D / R0 — Baseline (potwierdzający)
# Rozdzielczość: 128x128 (CelebA-HQ lub inny dataset HQ)
# Opis: Czysty baseline R3GAN na 128x128.
#        Używany w Fazie D (eksperyment potwierdzający):
#        baseline vs R_best, 3 seedy, 2 datasety lub 2 rozdzielczości.
#        Ten plik: 1 z 3 seedów → duplikuj z seed=43,44 dla pozostałych.
# Seed: 42 (seed 1 z 3)
# UWAGA: wymaga dużego VRAM — dostosuj batch_size do GPU
#         Na GB10 / RTX 3080: batch_size=32 lub 16
# =========================================================
name: "phase_d_r0_baseline_128_seed42"

# === DATASET ===
# Ustaw --data-dir na CelebA-HQ lub inny dataset 128x128
dataset_name: "celeba"
img_channels: 3
img_size: 128
img_resolution: 128

# === MODEL (pełny dla 128x128) ===
z_dim: 512
base_channels: 128
channel_max: 768
blocks_per_stage: 2
expansion_factor: 2
group_size: 16

# === DISCRIMINATOR: baseline ===
wavelet_enabled: false
matched_capacity_enabled: false

# === GENERATOR: brak regularizera ===
wave_reg_enabled: false
fft_reg_enabled: false

# === TRAINING ===
seed: 42
steps: 400000      # ~400 kimg przy batch=32
batch_size: 32
lr_g: 2.0e-4
lr_d: 2.0e-4
betas: [0.0, 0.99]
gamma: 10.0
ema_beta: 0.9995   # wyższe ema_beta przy małym batch wg overnight
use_amp_for_g: true
use_amp_for_d: false
channels_last: true

# === LOGGING ===
log_every: 200
grid_every: 5000
ckpt_every: 100000
save_n_samples: 64

# === GAN METRICS (co ~5 kimg przy batch=32 → co 5000 steps) ===
metrics_every: 5000
metrics_num_fake: 50000
metrics_fake_batch_size: 64
metrics_fid_feature: 2048
metrics_kid_feature: 2048
metrics_kid_subsets: 100
metrics_kid_subset_size: 1000
metrics_max_real: 50000
metrics_pr_num_samples: 10000
metrics_pr_k: 3
metrics_lpips_num_pairs: 2048
metrics_lpips_pool_size: 4096
metrics_amp_dtype: "bf16"
metrics_spectral: true

