# =========================================================
# Eksperyment: Faza E / R10 — WaveD + WaveReg + schedule + gate warmup (P0 combo)
# Rozdzielczość: 32x32 (CIFAR-10)
# Baza: r3 (wavelet D + wavereg), ale z OBYDWOMA poprawkami P0 jednocześnie
#
# Łączy hipotezy 1 i 2:
#   [P0-H1] Harmonogram wagi wavereg: 0.0 (0-5k) → 0.02 (15k) → 0.005 (30k)
#   [P0-H2] Opóźniony gate warmup gałęzi wavelet D: 0.0 (0-3k) → 0.4 (12k+)
#
# Uzasadnienie synergii:
#   - Wave_reg aktywuje się dopiero od 5k → model ma szansę stabilnie zbudować
#     reprezentację zanim dojdzie dodatkowy sygnał spektralny
#   - Gate warmup kończy się przy 12k; wave_reg osiąga szczyt przy 15k → kolejność
#     pozwala gałęzi HF w D "dojrzeć" zanim G dostanie mocną karę spektralną
#   - Annealing wave_reg po 15k zapobiega over-regularization na ogonie treningu
#
# Jeśli r7 i r9 dają zysk niezależnie, r10 powinien dać zysk łączny.
# Jeśli r10 jest gorszy niż oba składowe → konflik celów (wynik diagnostyczny).
# Seed: 42 | Główny kandydat do publikacji jeśli hipotezy P0 się potwierdzą
# =========================================================
name: "phase_e_r10_waved_wavereg_combo_32"

# === DATASET ===
dataset_name: "cifar10"
img_channels: 3
img_size: 32
img_resolution: 32

# === MODEL ===
z_dim: 128
base_channels: 64
channel_max: 512
blocks_per_stage: 2
expansion_factor: 2
group_size: 16

# === DISCRIMINATOR: gałąź waveletowa HF + opóźniony gate warmup ===
wavelet_enabled: true
matched_capacity_enabled: false
wavelet_type: "haar"
wavelet_level: 1
wavelet_hf_only: true
wavelet_fuse_after_stage: 0
wavelet_branch_mid_scale: 0.5
wavelet_init_gate: 0.0

# === AUX BRANCH GATE WARMUP (P0 hipoteza 2) ===
# Identyczny harmonogram jak r9: 0→0.4 w oknie 3k-12k
aux_branch_gate_warmup_enabled: true
aux_branch_gate_warmup_start_step: 3000
aux_branch_gate_warmup_end_step: 12000
aux_branch_gate_warmup_start_value: 0.0
aux_branch_gate_warmup_end_value: 0.4

# === GENERATOR: WaveReg z harmonogramem wagi (P0 hipoteza 1) ===
# Identyczny schedule jak r7/r8: 0.0→0.02→0.005 w oknach 0-5k / 5k-15k / 15k-30k
wave_reg_enabled: true
wave_reg_weight: 0.02
wave_reg_ema_beta: 0.99
wave_reg_schedule_enabled: true
wave_reg_schedule_start_step: 5000
wave_reg_schedule_peak_step: 15000
wave_reg_schedule_end_step: 30000
wave_reg_schedule_start_weight: 0.0
wave_reg_schedule_peak_weight: 0.02
wave_reg_schedule_end_weight: 0.005
fft_reg_enabled: false

# === TRAINING (identyczne jak R0/R3 — krytyczne!) ===
seed: 42
steps: 30000
batch_size: 128
lr_g: 2.0e-4
lr_d: 2.0e-4
betas: [0.0, 0.99]
gamma: 10.0
ema_beta: 0.999
use_amp_for_g: true
use_amp_for_d: false
channels_last: true

# === LOGGING ===
log_every: 100
grid_every: 2000
ckpt_every: 10000
save_n_samples: 64

# === GAN METRICS (identyczne jak R0) ===
metrics_every: 2500
metrics_num_fake: 50000
metrics_fake_batch_size: 256
metrics_fid_feature: 2048
metrics_kid_feature: 2048
metrics_kid_subsets: 100
metrics_kid_subset_size: 1000
metrics_max_real: 50000
metrics_pr_num_samples: 10000
metrics_pr_k: 3
metrics_lpips_num_pairs: 2048
metrics_lpips_pool_size: 4096
metrics_amp_dtype: "bf16"
metrics_spectral: true

