# =========================================================
# Eksperyment: Faza C / R4 — WaveD + FFTReg (kontrola)
# Rozdzielczość: 64x64
# =========================================================
name: "phase_c_r4_waved_fftreg_64"

# === DATASET ===
dataset_name: "cifar10"
img_channels: 3
img_size: 64
img_resolution: 64

# === MODEL ===
z_dim: 256
base_channels: 96
channel_max: 768
blocks_per_stage: 2
expansion_factor: 2
group_size: 16

# === DISCRIMINATOR: wavelet HF branch ===
wavelet_enabled: true
matched_capacity_enabled: false
wavelet_type: "haar"
wavelet_level: 1
wavelet_hf_only: true
wavelet_fuse_after_stage: 0
wavelet_branch_mid_scale: 0.5
wavelet_init_gate: 0.0

# === GENERATOR: FFT regularizer (kontrola) ===
wave_reg_enabled: false
fft_reg_enabled: true
fft_reg_weight: 0.02

# === TRAINING ===
seed: 42
steps: 200000
batch_size: 64
lr_g: 2.0e-4
lr_d: 2.0e-4
betas: [0.0, 0.99]
gamma: 10.0
ema_beta: 0.999
use_amp_for_g: true
use_amp_for_d: false
channels_last: true

# === LOGGING ===
log_every: 100
grid_every: 2000
ckpt_every: 50000
save_n_samples: 64

# === GAN METRICS ===
metrics_every: 5000
metrics_num_fake: 10000
metrics_fake_batch_size: 128
metrics_fid_feature: 2048
metrics_kid_feature: 2048
metrics_kid_subsets: 100
metrics_kid_subset_size: 1000
metrics_max_real: 50000
metrics_pr_num_samples: 10000
metrics_pr_k: 3
metrics_lpips_num_pairs: 2048
metrics_lpips_pool_size: 4096
metrics_amp_dtype: "bf16"
metrics_spectral: true

