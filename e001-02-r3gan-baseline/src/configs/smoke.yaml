# =========================================================
# Profil: smoke
# Super-szybki smoke test — 200 steps, żeby sprawdzić
# czy pipeline nie sypie się błędami
# =========================================================
name: "smoke"

dataset_name: "cifar10"
img_channels: 3
img_size: 32
img_resolution: 32

z_dim: 64
base_channels: 32
channel_max: 256
blocks_per_stage: 1
expansion_factor: 2
group_size: 8

steps: 200
batch_size: 16
lr_g: 2.0e-4
lr_d: 2.0e-4
gamma: 10.0

log_every: 10
grid_every: 100
ckpt_every: 200
save_n_samples: 16

# === GAN METRICS — wyłączone w smoke teście ===
metrics_every: 0

