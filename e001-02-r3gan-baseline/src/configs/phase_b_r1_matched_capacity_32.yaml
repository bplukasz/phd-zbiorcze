# =========================================================
# Eksperyment: Faza B / R1 — Matched-Capacity Control
# Rozdzielczość: 32x32 (CIFAR-10)
# Opis: Kontrolny wariant z dodatkową gałęzią o podobnym koszcie
#        i liczbie parametrów co WaveD, ale BEZ DWT.
#        Wejście gałęzi: avg_pool2d(RGB, 2) + mała wieża conv.
#        Cel: sprawdzić, czy zysk daje struktura waveletowa,
#        czy samo dodanie dodatkowej ścieżki.
# Seed: 42 (single seed — Faza B)
# =========================================================
name: "phase_b_r1_matched_capacity_32"

# === DATASET ===
dataset_name: "cifar10"
img_channels: 3
img_size: 32
img_resolution: 32

# === MODEL ===
z_dim: 128
base_channels: 64
channel_max: 512
blocks_per_stage: 2
expansion_factor: 2
group_size: 16

# === DISCRIMINATOR: matched-capacity branch (bez DWT) ===
wavelet_enabled: false
matched_capacity_enabled: true
wavelet_fuse_after_stage: 0
wavelet_branch_mid_scale: 0.5
wavelet_init_gate: 0.0

# === GENERATOR: brak regularizera ===
wave_reg_enabled: false
fft_reg_enabled: false

# === TRAINING (identyczne jak R0 — krytyczne!) ===
seed: 42
steps: 30000
batch_size: 128
lr_g: 2.0e-4
lr_d: 2.0e-4
betas: [0.0, 0.99]
gamma: 10.0
ema_beta: 0.999
use_amp_for_g: true
use_amp_for_d: false
channels_last: true

# === LOGGING ===
log_every: 100
grid_every: 2000
ckpt_every: 10000
save_n_samples: 64

# === GAN METRICS (identyczne jak R0) ===
metrics_every: 2500
metrics_num_fake: 50000
metrics_fake_batch_size: 256
metrics_fid_feature: 2048
metrics_kid_feature: 2048
metrics_kid_subsets: 100
metrics_kid_subset_size: 1000
metrics_max_real: 50000
metrics_pr_num_samples: 10000
metrics_pr_k: 3
metrics_lpips_num_pairs: 2048
metrics_lpips_pool_size: 4096
metrics_amp_dtype: "bf16"
metrics_spectral: true

